<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — FOSS Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #dbeafe;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background-color: #0f172a;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    nav img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    .nav-brand span {
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
    }

    nav a.back-btn {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav a.back-btn:hover {
      color: #fff;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
      background-color: #0f172a;
      background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      color: #fff;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    h1 span {
      color: #2563eb;
    }

    p {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 2rem;
      margin-top: 1rem;
    }

    a.btn {
      background-color: #2563eb;
      color: white;
      padding: 0.7rem 1.8rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }

    a.btn:hover {
      background-color: #1d4ed8;
    }

    footer {
      text-align: center;
      padding: 1.2rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      background: #060e1a;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">
      <img src="foss-logo.png" alt="FOSS Club Logo" />
      <span>FOSS Club</span>
    </a>
    <a href="index.html" class="back-btn">← Back to Home</a>
  </nav>

  <main>
    <h1>Registrations will be <span>opening soon!</span></h1>
    <p>We're still working out the details for this event. Check back soon or use the contact form on the home page to get notified when registrations open.</p>
    <a href="index.html#contact" class="btn">Go to Contact</a>
  </main>

  <footer>FOSS Club LBSITW</footer>

</body>
</html>
